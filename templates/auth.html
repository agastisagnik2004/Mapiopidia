<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapiopidia – Sign In</title>
  <style>
    :root {
      --bg: #f6f5f0;
      --card: #ffffff;
      --ink: #1f2a1f;
      --muted: #55635a;
      --accent: #0f766e;
      --border: #d9e0d9;
      --orange: #ff8c00;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 0%, #e8f6ef 0%, transparent 45%),
                  radial-gradient(circle at 100% 100%, #fff3d8 0%, transparent 40%),
                  var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 12px 40px rgba(16, 38, 29, 0.1);
    }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand h1 { font-size: 1.9rem; color: var(--orange); }
    .brand p  { color: var(--muted); font-size: 0.92rem; margin-top: 4px; }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 22px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Form */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.88rem; color: var(--muted); margin-bottom: 5px; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      font: inherit;
      font-size: 0.97rem;
      color: var(--orange);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: #bbb; }
    input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,140,0,.15);
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font: inherit;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 6px;
      background: linear-gradient(120deg, #0f766e, #178f87);
      color: #fff;
      transition: opacity .2s;
    }
    .btn:disabled { opacity: .6; cursor: wait; }
    .msg {
      margin-top: 12px;
      padding: 10px 13px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.error   { background: #fff1f1; border: 1px solid #fecaca; color: var(--danger); }
    .msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }

    .divider { text-align: center; color: var(--muted); font-size: 0.85rem; margin: 16px 0; }
    .back-link {
      display: block;
      text-align: center;
      color: var(--accent);
      font-size: 0.9rem;
      text-decoration: none;
      margin-top: 16px;
    }
    .back-link:hover { text-decoration: underline; }

    /* User ID badge */
    .uid-badge {
      background: #f0f9f8;
      border: 1px solid #a7d8d1;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 14px;
      font-size: 0.88rem;
      display: none;
    }
    .uid-badge .uid-label { color: var(--muted); margin-bottom: 4px; }
    .uid-badge .uid-value {
      font-family: monospace;
      font-size: 0.83rem;
      color: var(--accent);
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="auth-box">
  <div class="brand">
    <h1>Mapiopidia</h1>
    <p>Sign in to track your device on the map</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabLogin"  onclick="showTab('login')">Sign In</div>
    <div class="tab"        id="tabSignup" onclick="showTab('signup')">Register</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="formLogin">
    <div class="form-group">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="formSignup" style="display:none;">
    <div class="form-group">
      <label for="regName">Full Name</label>
      <input id="regName" type="text" placeholder="Jane Doe" autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="regEmail">Email</label>
      <input id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="regPassword">Password <span style="color:var(--muted);font-weight:400;">(min 6 chars)</span></label>
      <input id="regPassword" type="password" placeholder="••••••••" autocomplete="new-password" />
    </div>
    <button class="btn" id="signupBtn" onclick="doSignup()">Create Account</button>
    <div id="signupMsg" class="msg"></div>
    <div id="uidBadge" class="uid-badge">
      <div class="uid-label">🎉 Your Device ID (keep this safe)</div>
      <div class="uid-value" id="uidValue"></div>
    </div>
  </div>

  <a class="back-link" href="/">← Back to Map</a>
</div>

<script>
  function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('formLogin').style.display  = isLogin ? '' : 'none';
    document.getElementById('formSignup').style.display = isLogin ? 'none' : '';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
    el.style.display = 'block';
  }

  async function doLogin() {
    const btn   = document.getElementById('loginBtn');
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    if (!email || !pass) { showMsg('loginMsg', 'Please fill in all fields.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();
      if (!res.ok) { showMsg('loginMsg', data.detail || 'Login failed.', 'error'); return; }

      // Persist session
      localStorage.setItem('mpio_token', data.token);
      localStorage.setItem('mpio_name',  data.name);
      localStorage.setItem('mpio_uid',   data.user_id);

      showMsg('loginMsg', `Welcome back, ${data.name}! Redirecting…`, 'success');
      setTimeout(() => window.location.href = '/', 900);
    } catch (e) {
      showMsg('loginMsg', 'Network error. Try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function doSignup() {
    const btn  = document.getElementById('signupBtn');
    const name = document.getElementById('regName').value.trim();
    const email= document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPassword').value;
    if (!name || !email || !pass) { showMsg('signupMsg', 'Please fill in all fields.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    try {
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password: pass })
      });
      const data = await res.json();
      if (!res.ok) { showMsg('signupMsg', data.detail || 'Registration failed.', 'error'); return; }

      // Show the newly created user ID
      document.getElementById('uidValue').textContent = data.user_id;
      document.getElementById('uidBadge').style.display = 'block';
      showMsg('signupMsg', 'Account created! Please sign in below.', 'success');

      // Auto-switch to login tab after a moment
      setTimeout(() => showTab('login'), 1800);
    } catch (e) {
      showMsg('signupMsg', 'Network error. Try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  // If already logged in, go straight to map
  if (localStorage.getItem('mpio_token')) window.location.href = '/';

  // Open the right tab from URL hash: /auth#signup or /auth#login
  if (location.hash === '#signup') showTab('signup');

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('formLogin').style.display !== 'none') doLogin();
    else doSignup();
  });
</script>
</body>
</html>
